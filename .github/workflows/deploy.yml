# GitHub Pages deploy – statinė DI Promptų Biblioteka
# Reikalavimas: Repo Settings → Pages → Build and deployment: GitHub Actions
# Nuoroda: https://github.com/DITreneris/spinoff01 (QA standartas)

name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build locale pages (lt/en) with BASE_PATH for GitHub Pages
        run: npm run build
        env:
          BASE_PATH: '/cmo'
          SITE_ORIGIN: 'https://ditreneris.github.io'
      - uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v5
