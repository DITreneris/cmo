name: CI

# GitHub-hosted actions (checkout, setup-node) run on JS runtime; opt into Node 24 until default.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (structure + lint)
        run: npm test

      - name: Accessibility check (pa11y)
        run: |
          npx serve -s . -l 3000 &
          npx wait-on -t 60000 http://127.0.0.1:3000/
          npx pa11y http://127.0.0.1:3000/lt/ --standard WCAG2AA --ignore "warning" --reporter cli -- --no-sandbox
          npx pa11y http://127.0.0.1:3000/en/ --standard WCAG2AA --ignore "warning" --reporter cli -- --no-sandbox
          npx pa11y http://127.0.0.1:3000/lt/privatumas.html --standard WCAG2AA --ignore "warning" --reporter cli -- --no-sandbox
          npx pa11y http://127.0.0.1:3000/en/privacy.html --standard WCAG2AA --ignore "warning" --reporter cli -- --no-sandbox
        env:
          CI: true
